<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Background rounded rect (Catppuccin Mocha base) -->
  <rect width="48" height="48" rx="10" fill="#1e1e2e"/>

  <!-- Key ring (circle) -->
  <circle cx="16" cy="20" r="7" fill="none" stroke="#89b4fa" stroke-width="3"/>

  <!-- Key shaft -->
  <line x1="21.5" y1="24.5" x2="36" y2="39" stroke="#89b4fa" stroke-width="3" stroke-linecap="round"/>

  <!-- Key teeth -->
  <line x1="30" y1="33" x2="33.5" y2="29.5" stroke="#89b4fa" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="34" y1="37" x2="37.5" y2="33.5" stroke="#89b4fa" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Git branch indicator (small dots top-right) -->
  <circle cx="35" cy="10" r="3.5" fill="#a6e3a1"/>
  <circle cx="42" cy="16" r="2.5" fill="#a6e3a1" opacity="0.7"/>
  <circle cx="28" cy="16" r="2.5" fill="#a6e3a1" opacity="0.7"/>
  <line x1="35" y1="13.5" x2="35" y2="16" stroke="#a6e3a1" stroke-width="1.5"/>
  <line x1="35" y1="16" x2="42" y2="16" stroke="#a6e3a1" stroke-width="1.5"/>
  <line x1="35" y1="16" x2="28" y2="16" stroke="#a6e3a1" stroke-width="1.5"/>

  <!-- SSH label -->
  <text x="5" y="44" font-family="monospace" font-size="7" fill="#cba6f7" font-weight="bold">SSH</text>
</svg>
